services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://summa:${POSTGRES_PASSWORD:-summa}@db:5432/summa
      # REQUIRED: Override these before running in production — defaults will be rejected at startup
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set to a strong random secret (openssl rand -base64 32)}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      # REQUIRED in production: set to a 64-char hex string (openssl rand -hex 32)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set to a 64-char hex string (openssl rand -hex 32)}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: summa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-summa}
      POSTGRES_DB: summa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summa"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
