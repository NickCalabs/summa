      window.getSiteWhiteLabelConfigId = () => {
        if (!host === true) {
          return null;
        }

        if (host.endsWith("kubera.com")) {
          const subDomain = host.split(".")[0];
          if (subDomain !== "app" && subDomain !== "beta" && subDomain !== "app-staging" && subDomain !== "beta-staging" && subDomain !== "beta2-staging") {
            return encodeURI(subDomain.replace("-staging", ""));
          } else {
            return null;
          }
        } else if (host.includes("localhost")) {
          return null;
        } else {
          return encodeURI(host);
        }
      }

      // Set favicon based on site config id
      const wlkConfigId = window.getSiteWhiteLabelConfigId();
      var favIconPath = "kubera";

          favIconPath = "kkka"
        } else {
          favIconPath = wlkConfigId;

        var hostPartsForIcon = host.split(".");
        hostPartsForIcon.splice(-1,1)
        favIconPath = hostPartsForIcon.join(".")
      }

      const baseAssetUrl = "https://cdn.kubera.com/r/wlk";
      const links = document.querySelectorAll("link[rel*='icon']")
      const baseHref = `${baseAssetUrl}/${favIconPath}`;

      const url = `https://api.kubera.com/api/v1/public/manifest/${siteId}`
